trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  acrName: 'udaytodoacr'
  resourceGroup: 'todo-rg'
  containerInstanceName: 'todo-app'
  location: 'centralindia'
  imageName: 'todoapp'
  port: '8000'

stages:
- stage: Build
  jobs:
  - job: Build
    steps:
    - task: AzureCLI@2
      displayName: 'Build and Push Docker Image using existing ARM connection'
      inputs:
        azureSubscription: 'acr-connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          echo "ACR मध्ये लॉगिन करत आहे..."
          az acr login --name $(acrName)
          
          echo "डॉकर इमेज बनवत आहे..."
          docker build -t $(acrName).azurecr.io/$(imageName):latest .
          
          echo "डॉकर इमेज ACR मध्ये पुश करत आहे..."
          docker push $(acrName).azurecr.io/$(imageName):latest

- stage: Deploy
  dependsOn: Build
  jobs:
  - job: Deploy
    steps:
    - task: AzureCLI@2
      displayName: 'Deploy to Azure Container Instances'
      inputs:
        azureSubscription: 'acr-connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az acr update -n $(acrName) -g $(resourceGroup) --admin-enabled true
          ACR_PASSWORD=$(az acr credential show -n $(acrName) --query "passwords[0].value" -o tsv)
          az container delete --name $(containerInstanceName) --resource-group $(resourceGroup) --yes || true
          az container create \
            --resource-group $(resourceGroup) \
            --name $(containerInstanceName) \
            --image $(acrName).azurecr.io/$(imageName):latest \
            --registry-login-server $(acrName).azurecr.io \
            --registry-username $(acrName) \
            --registry-password $ACR_PASSWORD \
            --dns-name-label $(containerInstanceName)-$RANDOM \
            --ports $(port) \
            --location $(location) \
            --os-type Linux \
            --cpu 1 \
            --memory 1.5
          echo "========================================"
          echo "App URL: http://$(az container show --resource-group $(resourceGroup) --name $(containerInstanceName) --query ipAddress.fqdn -o tsv):$(port)"
          echo "========================================"
